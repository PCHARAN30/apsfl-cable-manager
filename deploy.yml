name: CI/CD Pipeline

on:
  push:
    branches:
      - main # Change this if your default branch is 'master'

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Uses a stable Node.js version

      - name: Install and Test Backend
        working-directory: ./backend
        run: |
          npm install
          npm test --if-present

      - name: Install and Test Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm test --if-present

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend

  deploy-backend:
    name: Deploy Backend to Render
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        # Render handles the actual build/deploy process on their servers.
        # We just need to ping the unique deploy hook URL they provide.
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}